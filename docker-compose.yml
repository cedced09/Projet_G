services:
  app:
    build: .
    container_name: gite-agent-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-gite_agent}:${POSTGRES_PASSWORD:-gite_agent}@db:5432/${POSTGRES_DB:-gite_agent}
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"

  db:
    image: postgis/postgis:16-3.4
    container_name: gite-agent-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gite_agent}
      POSTGRES_USER: ${POSTGRES_USER:-gite_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gite_agent}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
